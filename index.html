<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商机信息查询系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #f5f7fa;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* ===== 左栏：月份选择 ===== */
        .sidebar-months {
            width: 220px;
            min-width: 220px;
            background: linear-gradient(180deg, #1a1f36 0%, #2d3561 100%);
            color: white;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-header h1 {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .sidebar-header .subtitle {
            font-size: 0.75em;
            opacity: 0.6;
        }

        .month-list {
            padding: 12px 0;
        }

        .month-item {
            padding: 14px 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-left: 3px solid transparent;
        }

        .month-item:hover {
            background: rgba(255,255,255,0.08);
        }

        .month-item.active {
            background: rgba(102,126,234,0.25);
            border-left-color: #667eea;
        }

        .month-item .month-name {
            font-size: 0.95em;
            font-weight: 500;
        }

        .month-item .month-count {
            font-size: 0.75em;
            opacity: 0.5;
            background: rgba(255,255,255,0.15);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .month-item.active .month-count {
            opacity: 1;
            background: #667eea;
        }

        .total-stats {
            margin-top: auto;
            padding: 16px 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 0.8em;
            opacity: 0.5;
            text-align: center;
        }

        /* ===== 中栏：客户列表 ===== */
        .panel-list {
            width: 380px;
            min-width: 380px;
            background: white;
            border-right: 1px solid #e8e8e8;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        .panel-header h2 {
            font-size: 1.1em;
            color: #333;
            margin-bottom: 12px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: #f5f7fa;
            border-radius: 10px;
            padding: 0 14px;
            height: 40px;
        }

        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 0.9em;
            padding: 0 8px;
        }

        .search-box .icon {
            color: #999;
            font-size: 0.9em;
        }

        .customer-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .customer-item {
            padding: 14px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 6px;
            border: 1px solid transparent;
        }

        .customer-item:hover {
            background: #f8f9ff;
            border-color: #e0e4ff;
        }

        .customer-item.active {
            background: linear-gradient(135deg, #667eea08, #764ba208);
            border-color: #667eea;
            box-shadow: 0 2px 8px rgba(102,126,234,0.15);
        }

        .customer-item .title {
            font-size: 0.88em;
            color: #333;
            line-height: 1.4;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-weight: 500;
        }

        .customer-item .meta {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.78em;
            color: #999;
        }

        .customer-item .meta .tag {
            background: #f0f0f0;
            padding: 1px 8px;
            border-radius: 6px;
            color: #667eea;
            font-size: 0.85em;
        }

        .customer-item .meta .amount {
            color: #e74c3c;
            font-weight: 600;
            margin-left: auto;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #bbb;
        }

        .empty-state .icon {
            font-size: 3em;
            margin-bottom: 12px;
        }

        /* ===== 右栏：详情 ===== */
        .panel-detail {
            flex: 1;
            background: #f5f7fa;
            overflow-y: auto;
            padding: 24px 28px;
        }

        .detail-card {
            background: white;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            max-width: 700px;
            margin: 0 auto;
        }

        .detail-card .detail-title {
            font-size: 1.15em;
            color: #333;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid #f0f0f0;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .detail-row {
            display: flex;
            flex-direction: column;
            padding: 12px 14px;
            background: #f8f9fa;
            border-radius: 10px;
            gap: 4px;
        }

        .detail-row.full-width {
            grid-column: 1 / -1;
        }

        .detail-row.highlight {
            background: linear-gradient(135deg, #667eea10, #764ba210);
            border-left: 3px solid #667eea;
        }

        .detail-row.amount-row {
            background: linear-gradient(135deg, #e74c3c10, #c0392b10);
            border-left: 3px solid #e74c3c;
        }

        .detail-row .label {
            font-size: 0.75em;
            color: #999;
            font-weight: 500;
        }

        .detail-row .value {
            font-size: 0.92em;
            color: #333;
            word-break: break-all;
            line-height: 1.5;
        }

        .detail-row.amount-row .value {
            color: #e74c3c;
            font-weight: 700;
            font-size: 1.1em;
        }

        .detail-row .value a {
            color: #667eea;
            text-decoration: none;
            word-break: break-all;
        }

        .detail-row .value a:hover {
            text-decoration: underline;
        }

        .detail-row .value .empty {
            color: #bbb;
            font-style: italic;
        }

        .detail-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #bbb;
            font-size: 1em;
            flex-direction: column;
            gap: 12px;
        }

        .detail-placeholder .icon {
            font-size: 4em;
            opacity: 0.3;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #aaa;
        }

        /* 响应式 */
        @media (max-width: 1100px) {
            .sidebar-months { width: 180px; min-width: 180px; }
            .panel-list { width: 320px; min-width: 320px; }
        }

        @media (max-width: 900px) {
            .app { flex-direction: column; }
            .sidebar-months {
                width: 100%;
                min-width: auto;
                max-height: 160px;
                flex-direction: row;
                overflow-x: auto;
                overflow-y: hidden;
            }
            .sidebar-header { display: none; }
            .month-list { display: flex; padding: 8px; }
            .month-item { 
                white-space: nowrap; 
                border-left: none; 
                border-bottom: 3px solid transparent;
                border-radius: 8px;
            }
            .month-item.active { border-left-color: transparent; border-bottom-color: #667eea; }
            .total-stats { display: none; }
            .panel-list { width: 100%; min-width: auto; max-height: 40vh; border-right: none; border-bottom: 1px solid #e8e8e8; }
            .panel-detail { padding: 16px; }
            .detail-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

let currentMonth = '';
let currentFiltered = [];
let selectedId = null;

// 初始化月份列表
function initMonths() {
    const list = document.getElementById('month-list');
    let html = '';
    Object.keys(monthData).forEach(month => {
        const count = monthData[month].length;
        html += `<div class="month-item" data-month="${month}" onclick="selectMonth('${month}')">
            <span class="month-name">${month}</span>
            <span class="month-count">${count}条</span>
        </div>`;
    });
    list.innerHTML = html;
}

// 选择月份
function selectMonth(month) {
    currentMonth = month;
    selectedId = null;

    // 更新月份高亮
    document.querySelectorAll('.month-item').forEach(el => {
        el.classList.toggle('active', el.dataset.month === month);
    });

    // 更新标题
    document.getElementById('list-title').textContent = month + ' 客户列表';
    document.getElementById('search-input').value = '';

    // 渲染客户列表
    renderList(monthData[month]);

    // 清空详情
    document.getElementById('panel-detail').innerHTML = `
        <div class="detail-placeholder">
            <div class="icon">👆</div>
            <p>点击客户名称查看详情</p>
        </div>
    `;
}

// 渲染客户列表
function renderList(data) {
    currentFiltered = data;
    const listEl = document.getElementById('customer-list');

    if (data.length === 0) {
        listEl.innerHTML = `
            <div class="empty-state">
                <div class="icon">🔍</div>
                <p>无匹配记录</p>
            </div>`;
        return;
    }

    let html = '';
    data.forEach(item => {
        const amount = item.招标金额 && !isNaN(parseFloat(item.招标金额)) 
            ? '¥' + parseFloat(item.招标金额).toLocaleString() : '';
        const district = item.发布区级 ? `<span class="tag">${item.发布区级}</span>` : '';
        const isActive = item.id === selectedId ? 'active' : '';

        html += `
            <div class="customer-item ${isActive}" data-id="${item.id}" onclick="selectCustomer(${item.id})">
                <div class="title">${item.项目名称}</div>
                <div class="meta">
                    <span>${item.信息发布时间}</span>
                    ${district}
                    <span class="amount">${amount}</span>
                </div>
            </div>
        `;
    });
    listEl.innerHTML = html;
}

// 搜索过滤
function filterList() {
    const keyword = document.getElementById('search-input').value.toLowerCase().trim();
    if (!keyword) {
        renderList(monthData[currentMonth]);
        return;
    }
    const filtered = monthData[currentMonth].filter(item => 
        item.项目名称.toLowerCase().includes(keyword) ||
        item.单位名称.toLowerCase().includes(keyword) ||
        item.发布区级.toLowerCase().includes(keyword)
    );
    renderList(filtered);
}

// 选择客户显示详情
function selectCustomer(id) {
    selectedId = id;
    const item = currentFiltered.find(r => r.id === id);
    if (!item) return;

    // 更新列表高亮
    document.querySelectorAll('.customer-item').forEach(el => {
        el.classList.toggle('active', parseInt(el.dataset.id) === id);
    });

    const format = (val, isLink = false) => {
        if (!val || val === 'nan' || val === 'NaT') return '<span class="empty">--</span>';
        if (isLink && val.startsWith('http')) {
            return `<a href="${val}" target="_blank">${val}</a> 🔗`;
        }
        return val;
    };

    const amount = item.招标金额 && !isNaN(parseFloat(item.招标金额)) 
        ? '¥' + parseFloat(item.招标金额).toLocaleString() : (item.招标金额 || '--');

    document.getElementById('panel-detail').innerHTML = `
        <div class="detail-card">
            <div class="detail-title">📋 ${item.项目名称}</div>
            <div class="detail-grid">
                <div class="detail-row highlight">
                    <span class="label">🏢 单位名称</span>
                    <span class="value">${format(item.单位名称)}</span>
                </div>
                <div class="detail-row amount-row">
                    <span class="label">💰 招标金额</span>
                    <span class="value">${amount}</span>
                </div>
                <div class="detail-row">
                    <span class="label">📅 发布时间</span>
                    <span class="value">${format(item.信息发布时间)}</span>
                </div>
                <div class="detail-row">
                    <span class="label">📍 发布区域</span>
                    <span class="value">${format(item.发布区级)}</span>
                </div>
                <div class="detail-row">
                    <span class="label">👤 招标联系人</span>
                    <span class="value">${format(item.招标单位联系人)}</span>
                </div>
                <div class="detail-row">
                    <span class="label">📞 招标电话</span>
                    <span class="value">${format(item.招标单位联系人电话)}</span>
                </div>
                <div class="detail-row">
                    <span class="label">🏛️ 代理单位</span>
                    <span class="value">${format(item.代理单位)}</span>
                </div>
                <div class="detail-row">
                    <span class="label">👤 代理联系人</span>
                    <span class="value">${format(item.代理单位联系人)}</span>
                </div>
                <div class="detail-row">
                    <span class="label">📞 代理电话</span>
                    <span class="value">${format(item.代理单位联系人电话)}</span>
                </div>
                <div class="detail-row full-width">
                    <span class="label">🔗 官网查看地址</span>
                    <span class="value">${format(item.官网查看地址, true)}</span>
                </div>
            </div>
        </div>
    `;
}

// 初始化
initMonths();
// 默认选中第一个月份
selectMonth(Object.keys(monthData)[0]);
    </script>
